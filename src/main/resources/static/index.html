<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Reminder</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            margin: 0;
            padding: 1.5rem;
            min-height: 100dvh;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 1rem;
            color: #111;
        }

        /* Container */
        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Stats */
        .stats-block {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .stats-block div {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 999px;
            padding: 0.3rem 0.85rem;
            font-size: 0.82rem;
            color: #555;
        }

        .stats-block div:empty {
            display: none;
        }

        /* Word display */
        .word-block {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
        }

        .word-block .field-label {
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #595959;
        }

        #word-to-learn-span {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            transition: opacity 0.2s;
        }

        /* Input block */
        .input-block {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        #translation-input {
            flex: 1 1 0;
            min-width: 0;
            height: 2.75rem;
            padding: 0 0.75rem;
            font-size: 1rem;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #translation-input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        /* Buttons */
        button {
            min-height: 2.75rem;
            padding: 0.55rem 1.1rem;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .input-block button {
            height: 2.75rem;
            background: #4a90e2;
            color: #fff;
            white-space: nowrap;
        }

        .input-block button:hover {
            opacity: 0.88;
        }

        #next-button {
            background: #e8e8e8;
            color: #1a1a1a;
            border: 1px solid #c0c0c0;
        }

        #next-button:hover {
            background: #d8d8d8;
        }

        #next-button:focus-visible {
            outline: 2px solid #4a90e2;
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.2);
        }

        /* Spinner in button */
        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }

        /* noinspection CssUnusedSymbol */
        button.loading::after {
            content: '';
            display: inline-block;
            width: 0.85em;
            height: 0.85em;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: btn-spin 0.65s linear infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        /* noinspection CssUnusedSymbol */
        #next-button.loading::after {
            border-color: rgba(0, 0, 0, 0.3);
            border-top-color: #333;
        }

        /* Result block */
        .result-block {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        #result-feedback {
            padding: 0.85rem 1rem;
            border-radius: 8px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            min-height: 3.2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            transition: background 0.2s, border-color 0.2s;
        }

        #result-feedback .field-label {
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            flex-shrink: 0;
        }

        #real-translation-span {
            font-size: 1.25rem;
            font-weight: 600;
        }

        #learned-badge {
            background: #2e7d32;
            color: #fff;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* noinspection CssUnusedSymbol */
        #result-feedback.matched {
            background: #e6f4ea;
            border-color: #4caf50;
        }

        /* noinspection CssUnusedSymbol */
        #result-feedback.matched .field-label::before { content: '✓ '; }

        /* noinspection CssUnusedSymbol */
        #result-feedback.not-matched {
            background: #fdecea;
            border-color: #e53935;
        }

        /* noinspection CssUnusedSymbol */
        #result-feedback.not-matched .field-label::before { content: '✗ '; }

        /* noinspection CssUnusedSymbol */
        #result-feedback.closed {
            background: #fff8e1;
            border-color: #f59e0b;
        }

        /* noinspection CssUnusedSymbol */
        #result-feedback.closed .field-label::before { content: '– '; }

        /* Landscape mobile: reduce vertical spacing so feedback stays visible above keyboard */
        @media (max-height: 500px) and (orientation: landscape) {
            body { padding: 0.75rem; }
            .stats-block { margin-bottom: 0.75rem; }
            .word-block { padding: 0.5rem 1rem; margin-bottom: 0.5rem; }
            .input-block { margin-bottom: 0.5rem; }
            .result-block { gap: 0.4rem; }
        }

        /* Error */
        #error-span {
            display: block;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #fdecea;
            border: 1px solid #e53935;
            border-radius: 6px;
            color: #b71c1c;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Reminder</h1>
    <div class="stats-block">
        <div id="remaining-words-count-to-learn-span"></div>
        <div id="remaining-words-count-to-confirm-span"></div>
    </div>
    <div class="word-block">
        <span class="field-label">Mot</span>
        <span id="word-to-learn-span"></span>
    </div>
    <div class="input-block">
        <input id="translation-input" type="text" aria-label="Traduction" placeholder="Entrez la traduction…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"/>
        <button id="submit-button" onclick="submitTranslation()">Valider</button>
    </div>
    <div class="result-block">
        <div id="result-feedback" style="visibility: hidden">
            <span class="field-label">Traduction</span>
            <span id="real-translation-span"></span>
            <span id="learned-badge" style="display:none">appris !</span>
        </div>
        <div>
            <button id="next-button" onclick="getNextWord()">Suivant</button>
        </div>
    </div>
    <span id="error-span" style="display: none"></span>
</div>
</body>
<script>
    const clearError = () => {
        const el = document.getElementById('error-span');
        el.style.display = 'none';
        el.textContent = '';
    };

    const setRemainingWordsCount = async () => {
        const response = await fetch('/reminder/word/remaining');
        if (!response.ok) {
            let elementById = document.getElementById('error-span');
            elementById.style.display = 'block';
            elementById.textContent = await response.text();
            return;
        }
        const stats = JSON.parse(await response.text())
        document.getElementById('remaining-words-count-to-learn-span').textContent = `${stats.countToLearn} mot${stats.countToLearn > 1 ? 's' : ''} à apprendre.`;
        document.getElementById('remaining-words-count-to-confirm-span').textContent = `${stats.countToConfirm} mot${stats.countToConfirm > 1 ? 's' : ''} à confirmer.`;
    }
    const getNextWord = async () => {
        clearError();
        const nextBtn = document.getElementById('next-button');
        const wordSpan = document.getElementById('word-to-learn-span');
        nextBtn.disabled = true;
        nextBtn.classList.add('loading');
        const response = await fetch('/reminder/word/next');
        if (!response.ok) {
            let elementById = document.getElementById('error-span');
            elementById.style.display = 'block';
            elementById.textContent = await response.text();
            nextBtn.classList.remove('loading');
            nextBtn.disabled = false;
            wordSpan.style.opacity = '';
            return;
        }
        wordSpan.style.opacity = '0';
        wordSpan.textContent = JSON.parse(await response.text()).value;
        const feedback = document.getElementById('result-feedback');
        feedback.style.visibility = 'hidden';
        feedback.classList.remove('matched', 'not-matched', 'closed');
        let translation = document.getElementById('translation-input');
        translation.value = "";
        nextBtn.classList.remove('loading');
        nextBtn.disabled = false;
        requestAnimationFrame(() => wordSpan.style.opacity = '');
        translation.focus();
    };

    const submitTranslation = async () => {
        clearError();
        const submitBtn = document.getElementById('submit-button');
        const inputEl = document.getElementById('translation-input');
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;
        inputEl.disabled = true;
        const proposedTranslation = inputEl.value;
        const wordToLearn = document.getElementById('word-to-learn-span').textContent;
        const response = await fetch('/reminder/word/check', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({proposedTranslation, wordToLearn})
        });

        if (!response.ok) {
            let elementById = document.getElementById('error-span');
            elementById.style.display = 'block';
            elementById.textContent = await response.text();
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
            inputEl.disabled = false;
            return;
        }
        const check = JSON.parse(await response.text());
        const feedback = document.getElementById('result-feedback');
        feedback.style.visibility = 'visible';
        feedback.classList.remove('matched', 'not-matched', 'closed');
        const classMap = {MATCHED: 'matched', NOT_MATCHED: 'not-matched', CLOSED: 'closed'};
        if (classMap[check.matching]) feedback.classList.add(classMap[check.matching]);

        document.getElementById('real-translation-span').textContent = `«${check.realTranslation}»`;
        document.getElementById('learned-badge').style.display = check.learned ? '' : 'none';
        if (feedback.getBoundingClientRect().bottom > window.innerHeight) {
            feedback.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        inputEl.disabled = false;
        document.getElementById('next-button').focus();
    };

    document.getElementById("translation-input")
        .addEventListener("keydown", async event => {
            if (event.key === "Enter") {
                event.preventDefault();
                await submitTranslation();
            }
        });

    document.addEventListener("keydown", async event => {
        if (event.key !== "Enter") return;
        const active = document.activeElement;
        if (active === document.getElementById("translation-input")) return;
        if (active === document.getElementById("next-button")) return;
        const nextBtn = document.getElementById('next-button');
        if (!nextBtn.disabled && document.getElementById('result-feedback').style.visibility !== 'hidden') {
            event.preventDefault();
            await getNextWord();
        }
    });

    document.addEventListener("DOMContentLoaded", async () => {
        await Promise.all([setRemainingWordsCount(), getNextWord()]);
    });
</script>
</html>
